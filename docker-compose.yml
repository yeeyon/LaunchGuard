services:
  app:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DEMO_MODE: 'true'
      DATABASE_URL: ${DATABASE_URL:-}
      DIRECT_URL: ${DIRECT_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
